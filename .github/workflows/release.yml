name: Release

# Two ways to trigger a release build:
#   1. Push a version tag like `v0.1.1`  -> builds + publishes that release.
#   2. The "Run workflow" button (manual) -> builds + publishes from the
#      selected branch using the version in src-tauri/tauri.conf.json.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # The version that drives updates lives in tauri.conf.json, not the git
      # tag. Resolve it once and reuse it as the canonical release tag/name.
      - name: Resolve app version
        id: appversion
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version"    >> $env:GITHUB_OUTPUT
          Write-Host "App version is $version (release tag: v$version)"

      # Fail fast if you pushed a tag that doesn't match tauri.conf.json, so the
      # git tag and the actual app/updater version can never silently diverge.
      - name: Verify pushed tag matches app version
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $pushed   = "${{ github.ref_name }}"
          $expected = "${{ steps.appversion.outputs.tag }}"
          if ($pushed -ne $expected) {
            Write-Error "Tag '$pushed' does not match the version in src-tauri/tauri.conf.json (expected '$expected'). Bump the version in package.json AND src-tauri/tauri.conf.json, then push the matching tag."
            exit 1
          }
          Write-Host "OK: tag '$pushed' matches the app version."

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Added in repo Settings > Secrets and variables > Actions:
          #   TAURI_SIGNING_PRIVATE_KEY          = contents of .keys/cadmacro_updater.key
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD = contents of .keys/updater_password.txt
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.appversion.outputs.tag }}
          releaseName: "CadMacro ${{ steps.appversion.outputs.tag }}"
          releaseBody: "Automated release. CadMacro will offer this update in-app."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
